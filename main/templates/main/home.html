<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Finder - Find Your Dream Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #f8fafc;
            --accent-color: #10b981;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --success-color: #059669;
            --warning-color: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .hero-section {
            background: linear-gradient(135deg, var(--primary-color) 0%, #4f46e5 100%);
            padding: 60px 40px;
            text-align: center;
            color: white;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.025em;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            font-weight: 400;
            opacity: 0.9;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-section {
            padding: 48px 40px;
        }

        .search-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-title {
            font-size: 1.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .search-description {
            color: var(--text-secondary);
            font-size: 1.125rem;
        }

        .form-group {
            margin-bottom: 32px;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .multi-select {
            position: relative;
        }

        .select-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 400;
            background: white;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .select-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .select-input::placeholder {
            color: var(--text-secondary);
        }

        .dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            max-height: 280px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .dropdown.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.15s ease;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background-color: #f9fafb;
        }

        .dropdown-item.selected {
            background-color: var(--primary-color);
            color: white;
        }

        .dropdown-item.highlighted {
            background-color: #eff6ff;
        }

        .search-match {
            background-color: #fef3c7;
            color: #92400e;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: 500;
        }

        .no-results {
            padding: 24px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }

        .selected-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .selected-tag {
            background: linear-gradient(135deg, var(--primary-color) 0%, #4f46e5 100%);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: tagAppear 0.2s ease;
        }

        @keyframes tagAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .tag-remove {
            cursor: pointer;
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: background-color 0.15s ease;
        }

        .tag-remove:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .location-type {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .city-tag {
            background-color: var(--success-color);
            color: white;
        }

        .province-tag {
            background-color: var(--warning-color);
            color: white;
        }

        .search-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color) 0%, #4f46e5 100%);
            color: white;
            padding: 18px 32px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-md);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .footer-section {
            background: #f8fafc;
            padding: 32px 40px;
            text-align: center;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--primary-color);
            background: white;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .hero-section {
                padding: 40px 24px;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1.125rem;
            }

            .search-section {
                padding: 32px 24px;
            }

            .search-title {
                font-size: 1.5rem;
            }

            .footer-section {
                padding: 24px;
            }

            .nav-links {
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 1.75rem;
            }

            .search-section {
                padding: 24px 20px;
            }

            .nav-links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero-section">
            <h1 class="hero-title">🏠 House Finder</h1>
            <p class="hero-subtitle">Discover your perfect home in the Netherlands with our intelligent location search
            </p>
        </div>

        <div class="search-section">
            <div class="search-header">
                <h2 class="search-title">Where would you like to live?</h2>
                <p class="search-description">Search by city or province to find available properties</p>
            </div>

            <form id="searchForm">
                <div class="form-group">
                    <label for="locations" class="form-label">Location Search</label>
                    <div class="multi-select">
                        <input type="text" class="select-input" id="locations"
                            placeholder="Type to search cities or provinces...">
                        <div class="dropdown" id="locationsDropdown"></div>
                        <div class="selected-items" id="selectedLocations"></div>
                    </div>
                </div>

                <button type="submit" class="search-btn">🔍 Find Properties</button>
            </form>
        </div>

        <div class="footer-section">
            <nav class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/about/" class="nav-link">About</a>
                <a href="/admin/" class="nav-link">Admin</a>
            </nav>
            <p class="footer-text">&copy; 2025 House Finder. Built with Django.</p>
        </div>
    </div>

    <script>
        // City and province data from CSV (loaded from Django backend)
        const cityData = {{ city_data_json| safe }};

        // Create combined location data
        const provinces = [...new Set(cityData.map(item => item.province))].sort();
        const cities = cityData.map(item => ({ name: item.city, type: 'city' })).sort((a, b) => a.name.localeCompare(b.name));
        const provinceItems = provinces.map(province => ({ name: province, type: 'province' }));

        const allLocations = [...cities, ...provinceItems].sort((a, b) => a.name.localeCompare(b.name));

        let selectedLocations = [];
        let highlightedIndex = -1;
        let filteredLocations = [];

        function initializeDropdowns() {
            setupSearchBar();
        }

        function setupSearchBar() {
            const input = document.getElementById('locations');
            const dropdown = document.getElementById('locationsDropdown');

            // Remove readonly and add search functionality
            input.removeAttribute('readonly');
            input.placeholder = "Type to search cities or provinces...";

            input.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();

                if (searchTerm.length > 0) {
                    filteredLocations = allLocations.filter(location =>
                        location.name.toLowerCase().includes(searchTerm)
                    );
                    highlightedIndex = -1;
                    populateDropdown(searchTerm);
                    dropdown.classList.add('show');
                } else {
                    dropdown.classList.remove('show');
                }
            });

            input.addEventListener('focus', () => {
                const searchTerm = input.value.toLowerCase();

                if (searchTerm.length > 0) {
                    filteredLocations = allLocations.filter(location =>
                        location.name.toLowerCase().includes(searchTerm)
                    );
                    highlightedIndex = -1;
                    populateDropdown(searchTerm);
                    dropdown.classList.add('show');
                }
            });

            input.addEventListener('keydown', (e) => {
                if (dropdown.classList.contains('show')) {
                    switch (e.key) {
                        case 'ArrowDown':
                            e.preventDefault();
                            highlightedIndex = Math.min(highlightedIndex + 1, filteredLocations.length - 1);
                            updateHighlight();
                            break;
                        case 'ArrowUp':
                            e.preventDefault();
                            highlightedIndex = Math.max(highlightedIndex - 1, -1);
                            updateHighlight();
                            break;
                        case 'Enter':
                            e.preventDefault();
                            if (highlightedIndex >= 0) {
                                toggleSelection(filteredLocations[highlightedIndex]);
                                input.value = '';
                                dropdown.classList.remove('show');
                            }
                            break;
                        case 'Escape':
                            e.preventDefault();
                            input.value = '';
                            dropdown.classList.remove('show');
                            break;
                    }
                }
            });

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });
        }

        function populateDropdown(searchTerm = '') {
            const dropdown = document.getElementById('locationsDropdown');
            dropdown.innerHTML = '';

            if (filteredLocations.length === 0 && searchTerm.length > 0) {
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.textContent = 'No locations found';
                dropdown.appendChild(noResults);
                return;
            }

            filteredLocations.forEach((location, index) => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';

                const isSelected = selectedLocations.some(selected =>
                    selected.name === location.name && selected.type === location.type
                );
                if (isSelected) {
                    div.classList.add('selected');
                }

                // Highlight search matches
                const highlightedName = searchTerm ?
                    highlightSearchTerm(location.name, searchTerm) :
                    location.name;

                div.innerHTML = `
                    <span>${highlightedName}</span>
                    <span class="location-type ${location.type}-tag">${location.type}</span>
                `;

                div.addEventListener('click', () => {
                    toggleSelection(location);
                    document.getElementById('locations').value = '';
                    dropdown.classList.remove('show');
                });

                dropdown.appendChild(div);
            });
        }

        function highlightSearchTerm(text, searchTerm) {
            if (!searchTerm) return text;

            const regex = new RegExp(`(${searchTerm})`, 'gi');
            return text.replace(regex, '<span class="search-match">$1</span>');
        }

        function updateHighlight() {
            const items = document.querySelectorAll('.dropdown-item:not(.no-results)');
            items.forEach((item, index) => {
                item.classList.toggle('highlighted', index === highlightedIndex);
            });

            // Scroll highlighted item into view
            if (highlightedIndex >= 0 && items[highlightedIndex]) {
                items[highlightedIndex].scrollIntoView({
                    block: 'nearest',
                    behavior: 'smooth'
                });
            }
        }

        function toggleSelection(location) {
            const index = selectedLocations.findIndex(selected =>
                selected.name === location.name && selected.type === location.type
            );
            if (index > -1) {
                selectedLocations.splice(index, 1);
            } else {
                selectedLocations.push(location);
            }
            updateSelectedTags();
        }

        function updateSelectedTags() {
            const container = document.getElementById('selectedLocations');
            container.innerHTML = '';

            selectedLocations.forEach(location => {
                const tag = document.createElement('div');
                tag.className = 'selected-tag';
                tag.innerHTML = `
                    ${location.name}
                    <span class="location-type ${location.type}-tag">${location.type}</span>
                    <span class="tag-remove" onclick="removeSelection('${location.name}', '${location.type}')">&times;</span>
                `;
                container.appendChild(tag);
            });
        }

        function removeSelection(name, type) {
            const index = selectedLocations.findIndex(selected =>
                selected.name === name && selected.type === type
            );
            if (index > -1) {
                selectedLocations.splice(index, 1);
                updateSelectedTags();
            }
        }

        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const cities = selectedLocations.filter(loc => loc.type === 'city').map(loc => loc.name);
            const provinces = selectedLocations.filter(loc => loc.type === 'province').map(loc => loc.name);

            // Build query string
            const params = new URLSearchParams();
            if (cities.length > 0) {
                params.append('cities', cities.join(','));
            }
            if (provinces.length > 0) {
                params.append('provinces', provinces.join(','));
            }

            // Redirect to houses page with search parameters
            const queryString = params.toString();
            window.location.href = queryString ? `/houses/?${queryString}` : '/houses/';
        });

        // Initialize the search bar when the page loads
        document.addEventListener('DOMContentLoaded', initializeDropdowns);
    </script>
</body>

</html>
